<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230F4C81'><path d='M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z'/></svg>">
    <title>Book Consultation | PrimeNest Home Loan Advisors</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/main.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-bglight dark:bg-bgdark text-slate-800 dark:text-slate-100 antialiased">

    <!-- Navbar -->
        <!-- Minimal Navbar -->
    <nav id="navbar" class="fixed w-full z-50 top-0 transition-all duration-300 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <i class="ph-fill ph-house-line text-primary text-3xl"></i>
                    <a href="index.html" class="font-heading font-bold text-xl tracking-tight text-primary dark:text-white">
                        PrimeNest<span class="text-secondary">.</span>
                    </a>
                </div>

                <!-- Action Buttons & Toggles -->
                <div class="flex items-center space-x-2 xl:space-x-4 text-sm xl:text-base">
                    <!-- Toggles -->
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors text-gray-600 dark:text-gray-300" aria-label="Toggle Dark Mode">
                        <i class="ph ph-moon text-xl dark:hidden"></i>
                        <i class="ph ph-sun text-xl hidden dark:block"></i>
                    </button>
                    <button id="dir-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors text-gray-600 dark:text-gray-300 text-sm font-semibold" aria-label="Toggle Direction">
                        LTR
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white dark:bg-carddark rounded-3xl shadow-xl border border-gray-100 dark:border-gray-800 overflow-hidden fade-in">
                <!-- Header -->
                <div class="bg-primary p-8 md:p-10 text-center text-white">
                    <h1 class="text-3xl font-heading font-bold mb-2">Book Your Free Consultation</h1>
                    <p class="text-blue-100">Take the first step towards your dream home today.</p>
                </div>
                
                <!-- Form -->
                <div class="p-8 md:p-10 relative">
                    <!-- Success popup placeholder (hidden by default) -->
                    <div id="success-message" class="hidden absolute inset-0 bg-white/95 dark:bg-carddark/95 z-10 flex-col items-center justify-center text-center p-8 backdrop-blur-sm">
                        <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mb-6">
                            <i class="ph-fill ph-check-circle text-5xl"></i>
                        </div>
                        <h2 class="text-2xl font-bold dark:text-white mb-2">Booking Confirmed!</h2>
                        <p class="text-gray-600 dark:text-gray-400 mb-8">One of our expert advisors will contact you shortly to confirm your appointment time.</p>
                        <a href="index.html" class="bg-primary text-white px-8 py-3 rounded-lg font-bold">Back to Home</a>
                    </div>

                    <form id="booking-form" class="space-y-6" onsubmit="event.preventDefault(); document.getElementById('success-message').classList.remove('hidden'); document.getElementById('success-message').classList.add('flex');">
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Full Name</label>
                                <input type="text" class="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-primary dark:text-white transition-colors" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Phone Number</label>
                                <input type="tel" class="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-primary dark:text-white transition-colors" required>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                                <input type="email" class="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-primary dark:text-white transition-colors" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Property Value (Optional)</label>
                                <input type="text" placeholder="$" class="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-primary dark:text-white transition-colors">
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Loan Type</label>
                                <select class="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-primary dark:text-white transition-colors">
                                    <option>Home Purchase Loan</option>
                                    <option>Balance Transfer</option>
                                    <option>Loan Against Property</option>
                                    <option>Construction Loan</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Preferred Bank (Optional)</label>
                                <select class="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-primary dark:text-white transition-colors">
                                    <option>No Preference</option>
                                    <option>CityBank</option>
                                    <option>StandardTrust</option>
                                    <option>MetroFinance</option>
                                    <option>GlobalMortgage</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Preferred Date</label>
                                <input type="date" class="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-primary dark:text-white transition-colors" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Preferred Time</label>
                                <input type="time" class="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-primary dark:text-white transition-colors" required>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Additional Message</label>
                            <textarea rows="3" class="w-full px-4 py-3 rounded-lg bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-primary dark:text-white transition-colors" placeholder="Any specific requirements..."></textarea>
                        </div>

                        <button type="submit" class="w-full bg-primary hover:bg-secondary text-white font-bold py-4 px-4 rounded-lg transition-colors shadow-lg shadow-primary/30 text-lg">
                            Confirm Appointment
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>



    
</body>
</html>
