<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230F4C81'><path d='M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z'/></svg>">
    <title>Login | PrimeNest Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/tailwind-config.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-bglight dark:bg-bgdark text-slate-800 dark:text-slate-100 antialiased min-h-screen flex flex-col relative overflow-x-hidden selection:bg-primary selection:text-white">

    <!-- Background Elements -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-primary/20 dark:bg-primary/40 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-secondary/10 dark:bg-secondary/30 rounded-full blur-3xl"></div>
    </div>

    <!-- Minimal Navbar -->
    <nav id="navbar" class="fixed w-full z-50 top-0 transition-all duration-300 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-end items-center h-20 relative">
                <!-- Action Buttons & Toggles -->
                <div class="flex items-center space-x-2 xl:space-x-4 text-sm xl:text-base">
                    <!-- Toggles -->
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors text-gray-600 dark:text-gray-300" aria-label="Toggle Dark Mode">
                        <i class="ph ph-moon text-xl dark:hidden"></i>
                        <i class="ph ph-sun text-xl hidden dark:block"></i>
                    </button>
                    <button id="dir-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors text-gray-600 dark:text-gray-300 text-sm font-semibold" aria-label="Toggle Direction">
                        LTR
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center relative z-10 p-4 pt-24 pb-8 md:pt-28 md:pb-12">
        <div class="w-full max-w-md">
            <div class="glass-effect rounded-3xl p-6 sm:p-8 md:p-10 shadow-2xl fade-in">
                <div class="text-center mb-8">
                    <div class="flex items-center justify-center gap-2 mb-6">
                        <i class="ph-fill ph-house-line text-primary text-4xl sm:text-5xl"></i>
                        <a href="index.html" class="font-heading font-bold text-3xl sm:text-4xl tracking-tight text-primary dark:text-white">
                            PrimeNest<span class="text-secondary">.</span>
                        </a>
                    </div>
                    <h1 class="text-xl sm:text-2xl font-heading font-bold dark:text-white mb-2">Welcome Back</h1>
                    <p class="text-gray-600 dark:text-gray-300">Login to your portal</p>
                </div>

                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="ph ph-envelope text-gray-400"></i>
                            </div>
                            <input type="email" class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/50 dark:bg-slate-800/50 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary dark:text-white transition-colors" placeholder="john@example.com" required>
                        </div>
                    </div>
                    
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
                            <a href="#" class="text-sm text-primary dark:text-blue-400 hover:underline">Forgot password?</a>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="ph ph-lock text-gray-400"></i>
                            </div>
                            <input type="password" class="w-full pl-10 pr-4 py-3 rounded-lg bg-white/50 dark:bg-slate-800/50 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary dark:text-white transition-colors" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                        <label for="remember" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">Remember me</label>
                    </div>

                    <button type="submit" onclick="window.location.href='dashboard.html'; return false;" class="w-full bg-primary hover:bg-secondary text-white font-bold py-3.5 px-4 rounded-lg transition-colors shadow-lg shadow-primary/30">
                        Sign In
                    </button>
                </form>

                <div class="mt-8 relative">
                   
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-transparent text-gray-500 dark:text-gray-400">Or continue with</span>
                    </div>
                </div>

                <div class="mt-6 flex flex-col gap-3">
                    <button class="w-full flex justify-center items-center gap-3 py-3 px-4 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-slate-800 hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="h-5 w-5" alt="Google">
                        Sign in with Google
                    </button>
                    <button class="w-full flex justify-center items-center gap-3 py-3 px-4 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-slate-800 hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors">
                        <i class="ph-fill ph-facebook-logo text-[#1877F2] text-xl"></i>
                        Sign in with Facebook
                    </button>
                    <button class="w-full flex justify-center items-center gap-3 py-3 px-4 border border-gray-300 dark:border-gray-600 rounded-lg text-sm font-medium text-gray-700 dark:text-gray-200 bg-white dark:bg-slate-800 hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors">
                        <i class="ph-fill ph-apple-logo text-xl"></i>
                        Sign in with Apple
                    </button>
                </div>

                <p class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
                    Don't have an account? <a href="signup.html" class="font-medium text-primary dark:text-blue-400 hover:underline">Sign up</a>
                </p>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
