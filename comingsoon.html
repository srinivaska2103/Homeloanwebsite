<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%230F4C81'><path d='M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z'/></svg>">
    <title>Coming Soon | PrimeNest Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/main.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-bglight dark:bg-bgdark text-slate-800 dark:text-slate-100 antialiased h-screen flex flex-col relative overflow-hidden selection:bg-primary selection:text-white">

    <!-- Minimal Navbar -->
        <!-- Minimal Navbar -->
    <nav id="navbar" class="fixed w-full z-50 top-0 transition-all duration-300 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <i class="ph-fill ph-house-line text-primary text-3xl"></i>
                    <a href="index.html" class="font-heading font-bold text-xl tracking-tight text-primary dark:text-white">
                        PrimeNest<span class="text-secondary">.</span>
                    </a>
                </div>

                <!-- Action Buttons & Toggles -->
                <div class="flex items-center space-x-2 xl:space-x-4 text-sm xl:text-base">
                    <!-- Toggles -->
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors text-gray-600 dark:text-gray-300" aria-label="Toggle Dark Mode">
                        <i class="ph ph-moon text-xl dark:hidden"></i>
                        <i class="ph ph-sun text-xl hidden dark:block"></i>
                    </button>
                    <button id="dir-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors text-gray-600 dark:text-gray-300 text-sm font-semibold" aria-label="Toggle Direction">
                        LTR
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center relative z-10 p-4">
        <div class="text-center max-w-2xl fade-in">
            <div class="w-24 h-24 bg-blue-100 dark:bg-blue-900/30 text-primary dark:text-blue-400 rounded-full flex items-center justify-center mx-auto mb-8">
                <i class="ph-fill ph-rocket-launch text-5xl"></i>
            </div>
            
            <h1 class="text-4xl md:text-5xl font-heading font-bold dark:text-white mb-4">Something Awesome is Coming</h1>
            <p class="text-gray-600 dark:text-gray-400 text-lg mb-10">We are currently working on a brand new portal feature. Stay tuned!</p>
            
            <!-- Countdown -->
            <div class="flex justify-center gap-4 md:gap-8 mb-12">
                <div class="bg-white dark:bg-carddark px-6 py-4 rounded-xl shadow-lg border border-gray-100 dark:border-gray-800">
                    <div class="text-3xl font-bold text-primary dark:text-blue-400">14</div>
                    <div class="text-xs text-gray-500 uppercase tracking-wider mt-1">Days</div>
                </div>
                <div class="bg-white dark:bg-carddark px-6 py-4 rounded-xl shadow-lg border border-gray-100 dark:border-gray-800">
                    <div class="text-3xl font-bold text-primary dark:text-blue-400">08</div>
                    <div class="text-xs text-gray-500 uppercase tracking-wider mt-1">Hours</div>
                </div>
                <div class="bg-white dark:bg-carddark px-6 py-4 rounded-xl shadow-lg border border-gray-100 dark:border-gray-800">
                    <div class="text-3xl font-bold text-primary dark:text-blue-400">45</div>
                    <div class="text-xs text-gray-500 uppercase tracking-wider mt-1">Mins</div>
                </div>
            </div>

            <!-- Notify Form -->
            <form class="flex max-w-md mx-auto shadow-lg">
                <input type="email" placeholder="Enter your email to get notified" class="w-full px-4 py-3 rounded-l-lg border-y border-l border-gray-200 dark:border-gray-700 bg-white dark:bg-slate-800 focus:outline-none focus:border-primary dark:text-white" required>
                <button type="submit" class="bg-primary hover:bg-secondary px-6 py-3 rounded-r-lg text-white transition-colors font-medium">Notify Me</button>
            </form>
            
            <div class="mt-12 flex justify-center gap-6">
                <a href="#" class="text-gray-400 hover:text-primary transition-colors"><i class="ph-fill ph-facebook-logo text-2xl"></i></a>
                <a href="#" class="text-gray-400 hover:text-primary transition-colors"><i class="ph-fill ph-twitter-logo text-2xl"></i></a>
                <a href="#" class="text-gray-400 hover:text-primary transition-colors"><i class="ph-fill ph-linkedin-logo text-2xl"></i></a>
            </div>
        </div>
    </main>

    
</body>
</html>
